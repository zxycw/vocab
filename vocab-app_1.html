<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的單字本</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #000000;
    --surface: #111111;
    --surface2: #1a1a1a;
    --accent: #ffffff;
    --accent-soft: rgba(255,255,255,0.08);
    --text: #ffffff;
    --muted: #666666;
    --border: #2a2a2a;
    --green: #ffffff;
    --green-soft: rgba(255,255,255,0.08);
    --red: #ff4444;
    --yellow: #ffffff;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  h1 {
    text-align: center;
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    margin-bottom: 6px;
    color: #fff;
  }
  .subtitle {
    text-align: center;
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 28px;
  }

  /* Input card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    max-width: 560px;
    margin-left: auto;
    margin-right: auto;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }

  label {
    display: block;
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 0.95rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }

  /* Language selector */
  .lang-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .lang-btn {
    flex: 1;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .lang-btn.active {
    border-color: #fff;
    background: #fff;
    color: #000;
  }

  /* Add button */
  .btn-add {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #fff;
    color: #000;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    font-family: inherit;
  }
  .btn-add:hover { opacity: 0.88; }
  .btn-add:active { transform: scale(0.98); }
  .btn-add:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Status */
  .status {
    text-align: center;
    font-size: 0.82rem;
    min-height: 20px;
    margin-top: 10px;
    color: var(--muted);
  }
  .status.loading { color: var(--accent); }
  .status.error { color: var(--red); }

  /* Word list */
  .list-header {
    max-width: 560px;
    margin: 0 auto 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .list-header span { font-size: 0.82rem; color: var(--muted); }
  .btn-clear {
    font-size: 0.75rem;
    color: var(--red);
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    opacity: 0.7;
  }
  .btn-clear:hover { opacity: 1; }

  .word-list {
    max-width: 560px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .word-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    align-items: start;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .word-main {
    font-size: 1.1rem;
    font-weight: 600;
    color: #fff;
    margin-bottom: 2px;
  }
  .word-phonetic {
    font-size: 0.78rem;
    color: #888;
    margin-bottom: 6px;
  }
  .word-pos {
    display: inline-block;
    font-size: 0.7rem;
    background: transparent;
    color: #fff;
    border: 1px solid #333;
    border-radius: 6px;
    padding: 2px 8px;
    margin-right: 6px;
    margin-bottom: 4px;
  }
  .word-meaning {
    font-size: 0.88rem;
    color: var(--text);
    margin-top: 4px;
    line-height: 1.5;
  }
  .word-lang-tag {
    font-size: 0.68rem;
    color: var(--muted);
    background: var(--surface2);
    border-radius: 6px;
    padding: 2px 8px;
    margin-bottom: 4px;
    display: inline-block;
  }

  .btn-delete {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 2px 4px;
    border-radius: 6px;
    transition: color 0.2s, background 0.2s;
  }
  .btn-delete:hover { color: var(--red); background: rgba(248,113,113,0.1); }

  .empty {
    text-align: center;
    color: var(--muted);
    font-size: 0.88rem;
    padding: 40px 0;
  }

  /* Loading shimmer */
  .shimmer {
    display: inline-block;
    width: 60px;
    height: 12px;
    background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 4px;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
</style>
</head>
<body>

<h1>📖 我的單字本</h1>
<p class="subtitle">輸入單字 + 空耳，AI 幫你查詞性和中文意思</p>

<div class="card">
  <!-- Language selector -->
  <div class="lang-row">
    <button class="lang-btn active" data-lang="英文">🇺🇸 英文</button>
    <button class="lang-btn" data-lang="日文">🇯🇵 日文</button>
    <button class="lang-btn" data-lang="韓文">🇰🇷 韓文</button>
    <button class="lang-btn" data-lang="其他">🌐 其他</button>
  </div>

  <div class="row">
    <div>
      <label>單字</label>
      <input id="inputWord" placeholder="e.g. ephemeral" />
    </div>
    <div>
      <label>空耳（讀音）</label>
      <input id="inputPhonetic" placeholder="e.g. 一飛墨若" />
    </div>
  </div>

  <button class="btn-add" id="btnAdd" onclick="addWord()">＋ 加入單字本</button>
  <div class="status" id="status"></div>
</div>

<div class="list-header">
  <span id="countLabel">0 個單字</span>
  <button class="btn-clear" onclick="clearAll()">清空全部</button>
</div>
<div class="word-list" id="wordList">
  <div class="empty">還沒有單字，加入第一個吧！</div>
</div>

<script>
  let words = JSON.parse(localStorage.getItem('vocab_words') || '[]');
  let selectedLang = '英文';

  // Lang buttons
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedLang = btn.dataset.lang;
    });
  });

  // Enter key
  document.getElementById('inputWord').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('inputPhonetic').focus();
  });
  document.getElementById('inputPhonetic').addEventListener('keydown', e => {
    if (e.key === 'Enter') addWord();
  });

  async function addWord() {
    const word = document.getElementById('inputWord').value.trim();
    const phonetic = document.getElementById('inputPhonetic').value.trim();
    if (!word) { setStatus('請輸入單字', 'error'); return; }

    const btn = document.getElementById('btnAdd');
    btn.disabled = true;
    setStatus('AI 查詢中…', 'loading');

    try {
      const result = await lookupWord(word, phonetic, selectedLang);
      const entry = {
        id: Date.now(),
        word,
        phonetic,
        lang: selectedLang,
        pos: result.pos,
        meaning: result.meaning,
      };
      words.unshift(entry);
      save();
      render();
      document.getElementById('inputWord').value = '';
      document.getElementById('inputPhonetic').value = '';
      setStatus('');
    } catch (e) {
      setStatus('查詢失敗，請再試一次', 'error');
    } finally {
      btn.disabled = false;
    }
  }

  async function lookupWord(word, phonetic, lang) {
    const prompt = `你是一個語言學習助手。
使用者學習的語言：${lang}
單字：${word}
空耳（使用者記下的讀音）：${phonetic || '（未提供）'}

請用 JSON 格式回傳以下資訊（只回傳 JSON，不要其他文字）：
{
  "pos": "詞性（用中文，例如：名詞、動詞、形容詞、副詞、片語、慣用語等）",
  "meaning": "中文意思（簡潔清楚，1~2句）"
}`;

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 200,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    return JSON.parse(clean);
  }

  function render() {
    const list = document.getElementById('wordList');
    const count = document.getElementById('countLabel');
    count.textContent = `${words.length} 個單字`;

    if (words.length === 0) {
      list.innerHTML = '<div class="empty">還沒有單字，加入第一個吧！</div>';
      return;
    }

    list.innerHTML = words.map(w => `
      <div class="word-card">
        <div>
          <div class="word-main">${esc(w.word)}</div>
          ${w.phonetic ? `<div class="word-phonetic">🔊 ${esc(w.phonetic)}</div>` : ''}
          <span class="word-lang-tag">${esc(w.lang)}</span>
          <span class="word-pos">${esc(w.pos)}</span>
          <div class="word-meaning">${esc(w.meaning)}</div>
        </div>
        <button class="btn-delete" onclick="deleteWord(${w.id})" title="刪除">✕</button>
      </div>
    `).join('');
  }

  function deleteWord(id) {
    words = words.filter(w => w.id !== id);
    save();
    render();
  }

  function clearAll() {
    if (words.length === 0) return;
    if (confirm('確定要清空所有單字嗎？')) {
      words = [];
      save();
      render();
    }
  }

  function save() {
    localStorage.setItem('vocab_words', JSON.stringify(words));
  }

  function setStatus(msg, type = '') {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status' + (type ? ' ' + type : '');
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  render();
</script>
</body>
</html>
