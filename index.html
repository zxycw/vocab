<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的單字本</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; color: #fff; font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; padding: 24px 16px 60px; }
  h1 { text-align: center; font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
  .subtitle { text-align: center; font-size: 0.82rem; color: #555; margin-bottom: 28px; }
  .card { background: #111; border: 1px solid #222; border-radius: 16px; padding: 20px; margin-bottom: 16px; max-width: 560px; margin-left: auto; margin-right: auto; }
  .lang-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .lang-btn { flex: 1; padding: 8px 4px; border-radius: 8px; border: 1px solid #222; background: #1a1a1a; color: #666; font-size: 0.82rem; cursor: pointer; font-family: inherit; transition: all 0.2s; }
  .lang-btn.active { border-color: #fff; background: #fff; color: #000; font-weight: 700; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  label { display: block; font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  input { width: 100%; background: #1a1a1a; border: 1px solid #222; border-radius: 10px; color: #fff; font-size: 0.95rem; padding: 10px 14px; outline: none; font-family: inherit; }
  input:focus { border-color: #fff; }
  input::placeholder { color: #444; }
  .btn-add { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #fff; color: #000; font-size: 0.95rem; font-weight: 700; cursor: pointer; font-family: inherit; }
  .btn-add:disabled { background: #333; color: #666; cursor: not-allowed; }
  .status { text-align: center; font-size: 0.82rem; min-height: 20px; margin-top: 10px; color: #666; }
  .status.error { color: #ff4444; }
  .list-header { max-width: 560px; margin: 0 auto 12px; display: flex; justify-content: space-between; align-items: center; }
  .list-header span { font-size: 0.82rem; color: #555; }
  .btn-clear { font-size: 0.75rem; color: #ff4444; background: none; border: none; cursor: pointer; font-family: inherit; }
  .word-list { max-width: 560px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
  .word-card { background: #111; border: 1px solid #222; border-radius: 14px; padding: 16px 18px; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .word-main { font-size: 1.15rem; font-weight: 700; }
  .word-sub { font-size: 0.78rem; color: #555; margin-top: 2px; }
  .word-pos { display: inline-block; font-size: 0.7rem; color: #888; border: 1px solid #2a2a2a; border-radius: 6px; padding: 2px 8px; margin-bottom: 8px; }
  .word-meaning { font-size: 0.92rem; color: #fff; margin-bottom: 8px; line-height: 1.6; }
  .word-example { border-left: 2px solid #222; padding-left: 10px; margin-top: 6px; }
  .word-example-en { font-size: 0.82rem; color: #777; line-height: 1.5; }
  .word-example-zh { font-size: 0.78rem; color: #555; margin-top: 3px; }
  .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
  .word-lang { font-size: 0.68rem; color: #444; }
  .btn-delete { background: none; border: none; color: #444; cursor: pointer; font-size: 0.82rem; font-family: inherit; }
  .btn-delete:hover { color: #ff4444; }
  .empty { text-align: center; color: #444; font-size: 0.88rem; padding: 40px 0; }
</style>
</head>
<body>
<h1>📖 我的單字本</h1>
<p class="subtitle">輸入單字 + 空耳，AI 幫你查詞性、意思、例句</p>

<div class="card">
  <div class="lang-row">
    <button class="lang-btn active" data-lang="en">🇺🇸 英文</button>
    <button class="lang-btn" data-lang="ja">🇯🇵 日文</button>
    <button class="lang-btn" data-lang="ko">🇰🇷 韓文</button>
  </div>
  <div class="row">
    <div><label>單字</label><input id="inputWord" placeholder="e.g. ephemeral" /></div>
    <div><label>空耳（讀音）</label><input id="inputPhonetic" placeholder="e.g. 一飛墨若" /></div>
  </div>
  <button class="btn-add" id="btnAdd" onclick="addWord()">＋ 加入單字本</button>
  <div class="status" id="status"></div>
</div>

<div class="list-header">
  <span id="countLabel">0 個單字</span>
  <button class="btn-clear" onclick="clearAll()">清空全部</button>
</div>
<div class="word-list" id="wordList"><div class="empty">還沒有單字，加入第一個吧！</div></div>

<script>
  let words = JSON.parse(localStorage.getItem('vocab_v3') || '[]');
  let lang = 'en';

  document.querySelectorAll('.lang-btn').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.lang-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      lang = b.dataset.lang;
    });
  });
  document.getElementById('inputWord').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('inputPhonetic').focus(); });
  document.getElementById('inputPhonetic').addEventListener('keydown', e => { if (e.key === 'Enter') addWord(); });

  async function addWord() {
    const word = document.getElementById('inputWord').value.trim();
    const phonetic = document.getElementById('inputPhonetic').value.trim();
    if (!word) { setStatus('請輸入單字', 'error'); return; }
    const btn = document.getElementById('btnAdd');
    btn.disabled = true;
    setStatus('AI 查詢中…');
    try {
      const res = await fetch('/api/lookup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ word, phonetic, lang })
      });
      if (!res.ok) throw new Error('API error: ' + res.status);
      const result = await res.json();
      console.log('API result:', result);
      const entry = {
        id: Date.now(),
        word,
        phonetic,
        lang,
        pos: result.pos || '',
        meaning: result.meaning || '',
        example: result.example || '',
        exampleZh: result.exampleZh || '',
        ipa: result.ipa || ''
      };
      words.unshift(entry);
      localStorage.setItem('vocab_v3', JSON.stringify(words));
      render();
      document.getElementById('inputWord').value = '';
      document.getElementById('inputPhonetic').value = '';
      setStatus('');
    } catch(e) {
      console.error(e);
      setStatus('查詢失敗：' + e.message, 'error');
    } finally {
      btn.disabled = false;
    }
  }

  function deleteWord(id) {
    words = words.filter(w => w.id !== id);
    localStorage.setItem('vocab_v3', JSON.stringify(words));
    render();
  }

  function clearAll() {
    if (!words.length) return;
    if (confirm('確定要清空所有單字嗎？')) {
      words = [];
      localStorage.setItem('vocab_v3', JSON.stringify(words));
      render();
    }
  }

  function render() {
    const list = document.getElementById('wordList');
    document.getElementById('countLabel').textContent = words.length + ' 個單字';
    const langLabel = { en: '英文', ja: '日文', ko: '韓文' };
    if (!words.length) {
      list.innerHTML = '<div class="empty">還沒有單字，加入第一個吧！</div>';
      return;
    }
    list.innerHTML = words.map(w => `
      <div class="word-card">
        <div class="card-top">
          <div>
            <div class="word-main">${esc(w.word)}</div>
            <div class="word-sub">${w.ipa ? esc(w.ipa) + (w.phonetic ? '　' : '') : ''}${w.phonetic ? '空耳：' + esc(w.phonetic) : ''}</div>
          </div>
          <button class="btn-delete" onclick="deleteWord(${w.id})">✕</button>
        </div>
        ${w.pos ? `<span class="word-pos">${esc(w.pos)}</span>` : ''}
        ${w.meaning ? `<div class="word-meaning">${esc(w.meaning)}</div>` : ''}
        ${w.example ? `<div class="word-example">
          <div class="word-example-en">${esc(w.example)}</div>
          ${w.exampleZh ? `<div class="word-example-zh">${esc(w.exampleZh)}</div>` : ''}
        </div>` : ''}
        <div class="card-footer"><span class="word-lang">${langLabel[w.lang] || w.lang}</span></div>
      </div>`).join('');
  }

  function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status' + (type ? ' ' + type : '');
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  render();
</script>
</body>
</html>
