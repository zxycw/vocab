<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的單字本</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; color: #fff; font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; padding: 24px 16px 60px; }
  
  /* NAV */
  .nav { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .nav-btn { padding: 8px 18px; border-radius: 20px; border: 1px solid #333; background: #111; color: #888; font-size: 0.85rem; cursor: pointer; font-family: inherit; transition: all 0.2s; }
  .nav-btn.active { background: #fff; color: #000; border-color: #fff; font-weight: 700; }

  h1 { text-align: center; font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
  .subtitle { text-align: center; font-size: 0.82rem; color: #555; margin-bottom: 20px; }

  /* PAGES */
  .page { display: none; }
  .page.active { display: block; }

  /* INPUT CARD */
  .card { background: #111; border: 1px solid #222; border-radius: 16px; padding: 20px; margin-bottom: 16px; max-width: 560px; margin-left: auto; margin-right: auto; }
  .lang-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .lang-btn { flex: 1; padding: 8px 4px; border-radius: 8px; border: 1px solid #222; background: #1a1a1a; color: #666; font-size: 0.82rem; cursor: pointer; font-family: inherit; transition: all 0.2s; }
  .lang-btn.active { border-color: #fff; background: #fff; color: #000; font-weight: 700; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  label { display: block; font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  input[type=text] { width: 100%; background: #1a1a1a; border: 1px solid #222; border-radius: 10px; color: #fff; font-size: 0.95rem; padding: 10px 14px; outline: none; font-family: inherit; }
  input[type=text]:focus { border-color: #fff; }
  input[type=text]::placeholder { color: #444; }
  .btn-primary { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #fff; color: #000; font-size: 0.95rem; font-weight: 700; cursor: pointer; font-family: inherit; }
  .btn-primary:disabled { background: #333; color: #666; cursor: not-allowed; }
  .status { text-align: center; font-size: 0.82rem; min-height: 20px; margin-top: 10px; color: #666; }
  .status.error { color: #ff4444; }

  /* SEARCH */
  .search-bar { max-width: 560px; margin: 0 auto 12px; }
  .search-bar input { width: 100%; background: #111; border: 1px solid #222; border-radius: 10px; color: #fff; font-size: 0.9rem; padding: 10px 14px; outline: none; font-family: inherit; }

  /* LIST */
  .list-header { max-width: 560px; margin: 0 auto 12px; display: flex; justify-content: space-between; align-items: center; }
  .list-header span { font-size: 0.82rem; color: #555; }
  .btn-clear { font-size: 0.75rem; color: #ff4444; background: none; border: none; cursor: pointer; font-family: inherit; }
  .word-list { max-width: 560px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
  .word-card { background: #111; border: 1px solid #222; border-radius: 14px; padding: 16px 18px; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .word-main { font-size: 1.15rem; font-weight: 700; }
  .word-sub { font-size: 0.78rem; color: #555; margin-top: 2px; }
  .word-pos { display: inline-block; font-size: 0.7rem; color: #888; border: 1px solid #2a2a2a; border-radius: 6px; padding: 2px 8px; margin-bottom: 8px; }
  .word-meaning { font-size: 0.92rem; color: #fff; margin-bottom: 8px; line-height: 1.6; }
  .word-example { border-left: 2px solid #222; padding-left: 10px; margin-top: 6px; }
  .word-example-en { font-size: 0.82rem; color: #777; line-height: 1.5; }
  .word-example-zh { font-size: 0.78rem; color: #555; margin-top: 3px; }
  .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; flex-wrap: wrap; gap: 8px; }
  .word-lang { font-size: 0.68rem; color: #444; }
  .card-actions { display: flex; gap: 6px; align-items: center; }
  .btn-icon { background: #1a1a1a; border: 1px solid #2a2a2a; color: #888; cursor: pointer; font-size: 0.8rem; padding: 4px 10px; border-radius: 6px; font-family: inherit; transition: all 0.2s; }
  .btn-icon:hover { color: #fff; border-color: #555; }
  .btn-icon.delete:hover { color: #ff4444; border-color: #ff4444; }

  /* STATUS BADGES */
  .status-badge { font-size: 0.7rem; padding: 3px 8px; border-radius: 20px; cursor: pointer; border: 1px solid; font-family: inherit; }
  .status-learning { background: rgba(251,191,36,0.1); color: #fbbf24; border-color: #fbbf24; }
  .status-known { background: rgba(74,222,128,0.1); color: #4ade80; border-color: #4ade80; }
  .status-hard { background: rgba(248,113,113,0.1); color: #f87171; border-color: #f87171; }

  /* FLASHCARD */
  .flashcard-wrap { max-width: 560px; margin: 0 auto; }
  .flashcard-info { text-align: center; font-size: 0.82rem; color: #555; margin-bottom: 16px; }
  .flashcard { background: #111; border: 1px solid #222; border-radius: 20px; padding: 48px 32px; text-align: center; cursor: pointer; min-height: 240px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.1s; user-select: none; }
  .flashcard:active { transform: scale(0.98); }
  .flashcard-word { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
  .flashcard-phonetic { font-size: 0.85rem; color: #555; margin-bottom: 24px; }
  .flashcard-hint { font-size: 0.78rem; color: #444; }
  .flashcard-answer { display: none; }
  .flashcard.revealed .flashcard-hint { display: none; }
  .flashcard.revealed .flashcard-answer { display: block; }
  .flashcard-meaning { font-size: 1.1rem; color: #fff; margin-bottom: 8px; }
  .flashcard-pos { font-size: 0.78rem; color: #666; margin-bottom: 12px; }
  .flashcard-example { font-size: 0.82rem; color: #777; font-style: italic; }
  .flashcard-btns { display: flex; gap: 12px; margin-top: 20px; justify-content: center; }
  .btn-knew { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #1a2a1a; color: #4ade80; font-size: 0.9rem; font-weight: 700; cursor: pointer; font-family: inherit; border: 1px solid #4ade80; }
  .btn-again { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #2a1a1a; color: #f87171; font-size: 0.9rem; font-weight: 700; cursor: pointer; font-family: inherit; border: 1px solid #f87171; }
  .btn-flip { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 0.9rem; cursor: pointer; font-family: inherit; margin-top: 20px; }

  /* QUIZ */
  .quiz-wrap { max-width: 560px; margin: 0 auto; }
  .quiz-score { text-align: center; font-size: 0.82rem; color: #555; margin-bottom: 16px; }
  .quiz-card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 32px 24px; }
  .quiz-question { font-size: 0.78rem; color: #555; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
  .quiz-target { font-size: 1.4rem; font-weight: 700; margin-bottom: 24px; line-height: 1.4; }
  .quiz-options { display: flex; flex-direction: column; gap: 10px; }
  .quiz-option { padding: 14px 18px; border-radius: 10px; border: 1px solid #222; background: #1a1a1a; color: #fff; font-size: 0.9rem; cursor: pointer; font-family: inherit; text-align: left; transition: all 0.2s; }
  .quiz-option:hover { border-color: #555; }
  .quiz-option.correct { background: #1a2a1a; border-color: #4ade80; color: #4ade80; }
  .quiz-option.wrong { background: #2a1a1a; border-color: #f87171; color: #f87171; }
  .quiz-option.reveal { border-color: #4ade80; }
  .quiz-next { width: 100%; margin-top: 16px; padding: 12px; border-radius: 10px; border: none; background: #fff; color: #000; font-size: 0.9rem; font-weight: 700; cursor: pointer; font-family: inherit; display: none; }
  .quiz-result { text-align: center; padding: 40px 0; }
  .quiz-result h2 { font-size: 1.5rem; margin-bottom: 12px; }
  .quiz-result p { color: #888; margin-bottom: 24px; }

  .empty { text-align: center; color: #444; font-size: 0.88rem; padding: 40px 0; }
  .empty-big { text-align: center; color: #444; font-size: 0.88rem; padding: 60px 20px; line-height: 1.8; }
</style>
</head>
<body>

<h1>📖 我的單字本</h1>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('add')">➕ 加入</button>
  <button class="nav-btn" onclick="showPage('list')">📋 單字表</button>
  <button class="nav-btn" onclick="showPage('flashcard')">🃏 Flashcard</button>
  <button class="nav-btn" onclick="showPage('quiz')">✏️ 測驗</button>
</nav>

<!-- ADD PAGE -->
<div id="page-add" class="page active">
  <div class="card">
    <div class="lang-row">
      <button class="lang-btn active" data-lang="en">🇺🇸 英文</button>
      <button class="lang-btn" data-lang="ja">🇯🇵 日文</button>
      <button class="lang-btn" data-lang="ko">🇰🇷 韓文</button>
    </div>
    <div class="row">
      <div><label>單字</label><input type="text" id="inputWord" placeholder="e.g. ephemeral" /></div>
      <div><label>空耳（讀音）</label><input type="text" id="inputPhonetic" placeholder="e.g. 一飛墨若" /></div>
    </div>
    <button class="btn-primary" id="btnAdd" onclick="addWord()">＋ 加入單字本</button>
    <div class="status" id="status"></div>
  </div>
</div>

<!-- LIST PAGE -->
<div id="page-list" class="page">
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="🔍 搜尋單字..." oninput="renderList()" />
  </div>
  <div class="list-header">
    <span id="countLabel">0 個單字</span>
    <button class="btn-clear" onclick="clearAll()">清空全部</button>
  </div>
  <div class="word-list" id="wordList"><div class="empty">還沒有單字，加入第一個吧！</div></div>
</div>

<!-- FLASHCARD PAGE -->
<div id="page-flashcard" class="page">
  <div class="flashcard-wrap">
    <div class="flashcard-info" id="fcInfo"></div>
    <div class="flashcard" id="flashcard" onclick="revealCard()">
      <div class="flashcard-word" id="fcWord"></div>
      <div class="flashcard-phonetic" id="fcPhonetic"></div>
      <div class="flashcard-hint">點擊看意思 👆</div>
      <div class="flashcard-answer">
        <div class="flashcard-pos" id="fcPos"></div>
        <div class="flashcard-meaning" id="fcMeaning"></div>
        <div class="flashcard-example" id="fcExample"></div>
      </div>
    </div>
    <div id="fcBtns" style="display:none">
      <div class="flashcard-btns">
        <button class="btn-again" onclick="fcAnswer(false)">❌ 不記得</button>
        <button class="btn-knew" onclick="fcAnswer(true)">✅ 記得了</button>
      </div>
    </div>
    <button class="btn-flip" id="fcFlipBtn" onclick="revealCard()">翻牌看答案</button>
    <div id="fcEmpty" class="empty-big" style="display:none">還沒有單字<br>先去加入頁面加幾個吧！</div>
  </div>
</div>

<!-- QUIZ PAGE -->
<div id="page-quiz" class="page">
  <div class="quiz-wrap">
    <div class="quiz-score" id="quizScore"></div>
    <div id="quizCard" class="quiz-card">
      <div class="quiz-question" id="quizQuestion"></div>
      <div class="quiz-target" id="quizTarget"></div>
      <div class="quiz-options" id="quizOptions"></div>
      <button class="quiz-next" id="quizNext" onclick="nextQuiz()">下一題 →</button>
    </div>
    <div id="quizResult" class="quiz-result" style="display:none">
      <h2 id="resultEmoji"></h2>
      <p id="resultText"></p>
      <button class="btn-primary" onclick="startQuiz()" style="max-width:200px;margin:0 auto">再來一次</button>
    </div>
    <div id="quizEmpty" class="empty-big" style="display:none">需要至少 4 個單字才能測驗<br>先去加入更多單字吧！</div>
  </div>
</div>

<script>
  let words = JSON.parse(localStorage.getItem('vocab_v4') || '[]');
  let lang = 'en';
  let fcIndex = 0;
  let fcRevealed = false;
  let fcQueue = [];
  let quizQ = 0, quizCorrect = 0, quizTotal = 0;
  let quizAnswered = false;

  // Lang buttons
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.lang-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      lang = b.dataset.lang;
    });
  });

  document.getElementById('inputWord').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('inputPhonetic').focus(); });
  document.getElementById('inputPhonetic').addEventListener('keydown', e => { if (e.key === 'Enter') addWord(); });

  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    event.target.classList.add('active');
    if (name === 'list') renderList();
    if (name === 'flashcard') initFlashcard();
    if (name === 'quiz') startQuiz();
  }

  async function addWord() {
    const word = document.getElementById('inputWord').value.trim();
    const phonetic = document.getElementById('inputPhonetic').value.trim();
    if (!word) { setStatus('請輸入單字', 'error'); return; }
    const btn = document.getElementById('btnAdd');
    btn.disabled = true;
    setStatus('AI 查詢中…');
    try {
      const res = await fetch('/api/lookup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ word, phonetic, lang })
      });
      if (!res.ok) throw new Error('API error: ' + res.status);
      const result = await res.json();
      const entry = {
        id: Date.now(), word, phonetic, lang,
        pos: result.pos || '', meaning: result.meaning || '',
        example: result.example || '', exampleZh: result.exampleZh || '',
        ipa: result.ipa || '', audio: result.audio || '',
        status: 'learning'
      };
      words.unshift(entry);
      save();
      document.getElementById('inputWord').value = '';
      document.getElementById('inputPhonetic').value = '';
      setStatus('✅ 已加入！');
      setTimeout(() => setStatus(''), 2000);
    } catch(e) {
      setStatus('查詢失敗：' + e.message, 'error');
    } finally {
      btn.disabled = false;
    }
  }

  function playAudio(word, lang) {
    if (lang === 'en') {
      const u = new SpeechSynthesisUtterance(word);
      u.lang = 'en-US';
      speechSynthesis.speak(u);
    } else if (lang === 'ja') {
      const u = new SpeechSynthesisUtterance(word);
      u.lang = 'ja-JP';
      speechSynthesis.speak(u);
    } else if (lang === 'ko') {
      const u = new SpeechSynthesisUtterance(word);
      u.lang = 'ko-KR';
      speechSynthesis.speak(u);
    }
  }

  function cycleStatus(id) {
    const order = ['learning', 'known', 'hard'];
    const w = words.find(x => x.id === id);
    if (!w) return;
    const idx = order.indexOf(w.status);
    w.status = order[(idx + 1) % order.length];
    save();
    renderList();
  }

  function deleteWord(id) {
    words = words.filter(w => w.id !== id);
    save();
    renderList();
  }

  function clearAll() {
    if (!words.length) return;
    if (confirm('確定要清空所有單字嗎？')) { words = []; save(); renderList(); }
  }

  function renderList() {
    const q = document.getElementById('searchInput')?.value?.toLowerCase() || '';
    const filtered = words.filter(w => w.word.toLowerCase().includes(q) || w.meaning.includes(q) || w.phonetic?.includes(q));
    const list = document.getElementById('wordList');
    document.getElementById('countLabel').textContent = filtered.length + ' / ' + words.length + ' 個單字';
    const langLabel = { en: '英文', ja: '日文', ko: '韓文' };
    const statusLabel = { learning: '學習中', known: '已學會', hard: '困難' };
    const statusClass = { learning: 'status-learning', known: 'status-known', hard: 'status-hard' };
    if (!filtered.length) { list.innerHTML = '<div class="empty">沒有符合的單字</div>'; return; }
    list.innerHTML = filtered.map(w => `
      <div class="word-card">
        <div class="card-top">
          <div>
            <div class="word-main">${esc(w.word)}</div>
            <div class="word-sub">${w.ipa ? esc(w.ipa) + (w.phonetic ? '　' : '') : ''}${w.phonetic ? '空耳：' + esc(w.phonetic) : ''}</div>
          </div>
          <button class="status-badge ${statusClass[w.status] || 'status-learning'}" onclick="cycleStatus(${w.id})">${statusLabel[w.status] || '學習中'}</button>
        </div>
        ${w.pos ? `<span class="word-pos">${esc(w.pos)}</span>` : ''}
        ${w.meaning ? `<div class="word-meaning">${esc(w.meaning)}</div>` : ''}
        ${w.example ? `<div class="word-example"><div class="word-example-en">${esc(w.example)}</div>${w.exampleZh ? `<div class="word-example-zh">${esc(w.exampleZh)}</div>` : ''}</div>` : ''}
        <div class="card-footer">
          <span class="word-lang">${langLabel[w.lang] || w.lang}</span>
          <div class="card-actions">
            <button class="btn-icon" onclick="playAudio('${esc(w.word)}', '${w.lang}')">🔊</button>
            <button class="btn-icon delete" onclick="deleteWord(${w.id})">✕ 刪除</button>
          </div>
        </div>
      </div>`).join('');
  }

  // FLASHCARD
  function initFlashcard() {
    fcQueue = [...words].sort(() => Math.random() - 0.5);
    fcIndex = 0;
    if (!fcQueue.length) {
      document.getElementById('flashcard').style.display = 'none';
      document.getElementById('fcFlipBtn').style.display = 'none';
      document.getElementById('fcBtns').style.display = 'none';
      document.getElementById('fcEmpty').style.display = 'block';
      return;
    }
    document.getElementById('fcEmpty').style.display = 'none';
    document.getElementById('flashcard').style.display = 'flex';
    document.getElementById('fcFlipBtn').style.display = 'block';
    showCard();
  }

  function showCard() {
    if (fcIndex >= fcQueue.length) {
      document.getElementById('fcInfo').textContent = '🎉 全部完成！';
      document.getElementById('flashcard').style.display = 'none';
      document.getElementById('fcFlipBtn').style.display = 'none';
      document.getElementById('fcBtns').style.display = 'none';
      return;
    }
    const w = fcQueue[fcIndex];
    fcRevealed = false;
    document.getElementById('fcInfo').textContent = (fcIndex + 1) + ' / ' + fcQueue.length;
    document.getElementById('fcWord').textContent = w.word;
    document.getElementById('fcPhonetic').textContent = [w.ipa, w.phonetic ? '空耳：' + w.phonetic : ''].filter(Boolean).join('　');
    document.getElementById('fcPos').textContent = w.pos;
    document.getElementById('fcMeaning').textContent = w.meaning;
    document.getElementById('fcExample').textContent = w.example;
    document.getElementById('flashcard').classList.remove('revealed');
    document.getElementById('fcBtns').style.display = 'none';
    document.getElementById('fcFlipBtn').style.display = 'block';
  }

  function revealCard() {
    if (fcRevealed) return;
    fcRevealed = true;
    document.getElementById('flashcard').classList.add('revealed');
    document.getElementById('fcBtns').style.display = 'block';
    document.getElementById('fcFlipBtn').style.display = 'none';
    playAudio(fcQueue[fcIndex].word, fcQueue[fcIndex].lang);
  }

  function fcAnswer(knew) {
    const w = fcQueue[fcIndex];
    if (!knew) fcQueue.push(w);
    else { w.status = 'known'; save(); }
    fcIndex++;
    showCard();
  }

  // QUIZ
  function startQuiz() {
    document.getElementById('quizResult').style.display = 'none';
    document.getElementById('quizCard').style.display = 'block';
    document.getElementById('quizEmpty').style.display = 'none';
    if (words.length < 4) {
      document.getElementById('quizCard').style.display = 'none';
      document.getElementById('quizEmpty').style.display = 'block';
      return;
    }
    quizQ = 0; quizCorrect = 0;
    quizTotal = Math.min(10, words.length);
    nextQuiz();
  }

  function nextQuiz() {
    document.getElementById('quizNext').style.display = 'none';
    quizAnswered = false;
    if (quizQ >= quizTotal) {
      document.getElementById('quizCard').style.display = 'none';
      document.getElementById('quizResult').style.display = 'block';
      const pct = Math.round(quizCorrect / quizTotal * 100);
      document.getElementById('resultEmoji').textContent = pct >= 80 ? '🎉' : pct >= 50 ? '💪' : '📚';
      document.getElementById('resultText').textContent = `答對 ${quizCorrect} / ${quizTotal} 題（${pct}%）`;
      return;
    }
    quizQ++;
    document.getElementById('quizScore').textContent = `第 ${quizQ} / ${quizTotal} 題　答對：${quizCorrect}`;

    const shuffled = [...words].sort(() => Math.random() - 0.5);
    const correct = shuffled[0];
    const wrong = shuffled.slice(1, 4);
    const mode = Math.random() > 0.5 ? 'en2zh' : 'zh2en';

    let question, answer, options;
    if (mode === 'en2zh') {
      document.getElementById('quizQuestion').textContent = '這個單字的中文意思是？';
      document.getElementById('quizTarget').textContent = correct.word;
      answer = correct.meaning;
      options = [correct.meaning, ...wrong.map(w => w.meaning)].sort(() => Math.random() - 0.5);
    } else {
      document.getElementById('quizQuestion').textContent = '這個中文意思對應的單字是？';
      document.getElementById('quizTarget').textContent = correct.meaning;
      answer = correct.word;
      options = [correct.word, ...wrong.map(w => w.word)].sort(() => Math.random() - 0.5);
    }

    const optEl = document.getElementById('quizOptions');
    optEl.innerHTML = options.map(o => `<button class="quiz-option" onclick="answerQuiz(this, '${esc(o)}', '${esc(answer)}')">${esc(o)}</button>`).join('');
  }

  function answerQuiz(el, chosen, answer) {
    if (quizAnswered) return;
    quizAnswered = true;
    const isCorrect = chosen === answer;
    if (isCorrect) { quizCorrect++; el.classList.add('correct'); }
    else {
      el.classList.add('wrong');
      document.querySelectorAll('.quiz-option').forEach(btn => {
        if (btn.textContent === answer) btn.classList.add('reveal');
      });
    }
    document.querySelectorAll('.quiz-option').forEach(b => b.style.pointerEvents = 'none');
    document.getElementById('quizNext').style.display = 'block';
    document.getElementById('quizScore').textContent = `第 ${quizQ} / ${quizTotal} 題　答對：${quizCorrect}`;
  }

  function save() { localStorage.setItem('vocab_v4', JSON.stringify(words)); }

  function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status' + (type ? ' ' + type : '');
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
</script>
</body>
</html>
